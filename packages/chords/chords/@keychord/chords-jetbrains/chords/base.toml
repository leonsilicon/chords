name = "JetBrains Base Chords"

[meta]
'$execPath' = ""

[on.command]
file = "jetbrains.js"
args = ['$execPath']

[chords]
'?e' = { name = "Editor" }
ea = { name = "Editor: Actions", 'emit:command' = ['QuickActions'] }
es = { name = "Editor: Solutions", 'emit:command' = ['QuickFixes'] }
ef = { name = "Editor: Focus", shortcut = "esc" }
ep = { name = "Editor: Pin", 'emit:command' = ['PinActiveEditorTab'] }
eu = { name = "Editor: Unpin", 'emit:command' = ['PinActiveTabToggle'] }
eq = { name = "Editor: Quit", 'emit:command' = ['CloseEditor'] }
eqa = { name = "Editor: Quit All", 'emit:command' = ['CloseAllEditors'] }
eqo = { name = "Editor: Quit Others", 'emit:command' = ['CloseAllEditorsButActive'] }
eql = { name = "Editor: Quit to the Left", 'emit:command' = ['CloseEditorsToTheLeft'] }
eqr = { name = "Editor: Quit to the Right", 'emit:command' = ['CloseEditorsToTheRight'] }
equ = { name = "Editor: Quit Unmodified", 'emit:command' = ['CloseUnmodifiedEditors'] }
